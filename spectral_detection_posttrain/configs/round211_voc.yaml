seed: 42
device: auto

data:
  dataset: voc
  root: E:/pythonProject1
  year: "2012"
  download: false
  classes: [person, car, dog]
  train_set: train
  val_set: val
  max_size: 480
  num_workers: 0

model:
  name: fasterrcnn_mobilenet_v3_large_320_fpn
  pretrained: true
  num_classes: 4
  min_size: 320
  max_size: 480

train:
  batch_size: 2
  epochs: 1
  lr: 0.003
  momentum: 0.9
  weight_decay: 0.0005

posttrain:
  epochs: 1
  lr: 0.001
  freeze_backbone: true
  freeze_rpn: true
  spatial_weight: 0.1
  spectral_gate_threshold: 0.65
  kl_weight: 1.0

eval:
  score_threshold: 0.05
  high_conf_threshold: 0.7
  fixed_recall: 0.85

patch:
  patch_size: 64
  patch_type: checkerboard
