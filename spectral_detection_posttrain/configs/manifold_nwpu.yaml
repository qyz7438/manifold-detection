seed: 42
device: cuda
data:
  dataset: nwpu_vhr10
  root: ./data/NWPU VHR-10 dataset
  annotation: ./data/NWPU_VHR10_coco.json
  train_fraction: 0.7
  max_size: 480
  num_workers: 0
model:
  name: fasterrcnn_mobilenet_v3_large_320_fpn
  pretrained: false
  allow_random_init_fallback: false
  num_classes: 11
  min_size: 480
  max_size: 480
train:
  batch_size: 2
  epochs: 1
  lr: 0.003
  momentum: 0.9
  weight_decay: 0.0005
posttrain:
  batch_size: 8
  epochs: 5
  lr: 0.00001
  freeze_backbone: true
matching:
  iou_threshold: 0.5
  score_threshold: 0.05
eval:
  batch_size: 1
  high_conf_threshold: 0.7
