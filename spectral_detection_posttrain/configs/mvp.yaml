seed: 42
device: cuda
data:
  root: ./data
  download: true
  train_fraction: 0.8
  max_size: 320
  num_workers: 0
model:
  name: fasterrcnn_mobilenet_v3_large_320_fpn
  pretrained: true
  allow_random_init_fallback: false
  num_classes: 2
  min_size: 320
  max_size: 320
train:
  batch_size: 2
  epochs: 1
  lr: 0.003
  momentum: 0.9
  weight_decay: 0.0005
posttrain:
  batch_size: 1
  epochs: 5
  lr: 0.0005
  reward_lambda: 1.0
  freeze_backbone: true
matching:
  iou_threshold: 0.5
  score_threshold: 0.05
eval:
  batch_size: 2
  high_conf_threshold: 0.7
patch:
  patch_type: random
  patch_size: 48
quality_head:
  amp_bins: 32
  max_candidates_per_image: 80
  feature_mode: roi_amp_structure
  hidden_dim: 256
  dropout: 0.1
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 8
  epochs: 8
  early_stopping_patience: 4
  rank_weight: 0.5
  rank_margin: 0.2
  r_amp_norm: minmax
rlvr:
  batch_size: 2
  lr_adamw: 0.0005
  lr_sgd: 0.005

